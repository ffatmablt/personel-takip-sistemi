name: ogrenciapi

services:
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: ogrencidb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

volumes:
  postgres-data: